<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3c3836"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="128" height="128" rx="20" fill="#1d2021"/>

  <!-- chip pins -->
  <g stroke="#a89984" stroke-width="3" stroke-linecap="round">
    <line x1="34" y1="14" x2="34" y2="26"/>
    <line x1="50" y1="14" x2="50" y2="26"/>
    <line x1="64" y1="14" x2="64" y2="26"/>
    <line x1="78" y1="14" x2="78" y2="26"/>
    <line x1="94" y1="14" x2="94" y2="26"/>

    <line x1="34" y1="102" x2="34" y2="114"/>
    <line x1="50" y1="102" x2="50" y2="114"/>
    <line x1="64" y1="102" x2="64" y2="114"/>
    <line x1="78" y1="102" x2="78" y2="114"/>
    <line x1="94" y1="102" x2="94" y2="114"/>

    <line x1="14" y1="34" x2="26" y2="34"/>
    <line x1="14" y1="50" x2="26" y2="50"/>
    <line x1="14" y1="64" x2="26" y2="64"/>
    <line x1="14" y1="78" x2="26" y2="78"/>
    <line x1="14" y1="94" x2="26" y2="94"/>

    <line x1="102" y1="34" x2="114" y2="34"/>
    <line x1="102" y1="50" x2="114" y2="50"/>
    <line x1="102" y1="64" x2="114" y2="64"/>
    <line x1="102" y1="78" x2="114" y2="78"/>
    <line x1="102" y1="94" x2="114" y2="94"/>
  </g>

  <!-- chip body -->
  <rect x="26" y="26" width="76" height="76" rx="10" fill="url(#chipGrad)" stroke="#665c54" stroke-width="2"/>

  <!-- inner CCD split (two dies, left/right) -->
  <rect x="34" y="34" width="26" height="60" rx="4" fill="#282828" stroke="#504945" stroke-width="1.5"/>
  <rect x="68" y="34" width="26" height="60" rx="4" fill="#282828" stroke="#504945" stroke-width="1.5"/>

  <!-- curve optimizer waveform, crossing both dies -->
  <path d="M 30 64
           C 40 64, 40 44, 50 44
           C 58 44, 58 84, 66 84
           C 74 84, 74 44, 82 44
           C 90 44, 90 64, 98 64"
        fill="none" stroke="#fabd2f" stroke-width="4" stroke-linecap="round"/>

  <!-- accent dots on the curve endpoints -->
  <circle cx="30" cy="64" r="3.2" fill="#8ec07c"/>
  <circle cx="98" cy="64" r="3.2" fill="#fb4934"/>
</svg>
